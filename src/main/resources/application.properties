# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=smartmatch-api

# ── Database (H2 in-memory for dev — swap for PostgreSQL in prod) ─────────────
spring.datasource.url=jdbc:h2:mem:smartmatch;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (dev only — disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ────────────────────────────────────────────────────────────────────────
# REQUIRED: must be 32+ characters. Use an env var in production:
#   -Dapp.jwt.secret=${JWT_SECRET}
app.jwt.secret=replace-this-with-a-random-32-char-minimum-secret-key
app.jwt.access-token-expiry-ms=900000
# 15 minutes ^^

app.jwt.refresh-token-expiry-ms=604800000
# 7 days ^^

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never

# ── Scheduling (refresh token cleanup cron) ────────────────────────────────────
spring.task.scheduling.pool.size=2

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.job=INFO
logging.level.org.springframework.security=WARN
